name: Mobile Builds

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Pushes to main only need a publish when the app version was bumped (V0.x.y
  # release commits). Every other merge already had its PR verify build, and
  # publishing an unchanged versionCode is rejected by Play Console.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - name: Decide whether to build
        id: decide
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${BEFORE//0/}" ]; then
            # New branch: no range to diff — build rather than silently skip.
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif git diff "$BEFORE" "$AFTER" -- android/app/build.gradle | grep -qE '^\+.*versionCode'; then
            echo "versionCode changed — publishing to Play Console."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged — skipping (PR build already verified this merge)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  android:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
      - run: npm run build:android
        env:
          VITE_HEAP_SERVER_URL: ${{ secrets.VITE_HEAP_SERVER_URL }}
          VITE_AD_PROVIDER: admob
          VITE_ADMOB_INTERSTITIAL_ID: ${{ secrets.VITE_ADMOB_INTERSTITIAL_ID }}
          VITE_ADMOB_REWARDED_ID: ${{ secrets.VITE_ADMOB_REWARDED_ID }}

      # ---- PR path: unsigned verify build only (no secrets, no AAB upload) ----
      - name: Build (PR — unsigned verify)
        if: github.event_name == 'pull_request'
        working-directory: android
        run: ./gradlew assembleDebug

      # ---- Push / workflow_dispatch path: publish signed AAB to Play Console ----
      - name: Decode keystore
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Publish to Play Console (internal track)
        if: github.event_name != 'pull_request'
        working-directory: android
        env:
          ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          ./gradlew publishReleaseBundle \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
