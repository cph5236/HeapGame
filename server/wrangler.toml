name = "heap-server"
main = "src/index.ts"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]

# Domain-sharded D1 databases. See docs/superpowers/runbooks/d1-sharding-kv-cache.md
# for provisioning + the one-time data move. Apply migrations via migrate-d1.yml.
[[d1_databases]]
binding = "DB_HEAP"
database_name = "heap_core"
database_id = "6c720154-e532-4ba5-854c-c361d556f9ed"
migrations_dir = "migrations/heap_core"

[[d1_databases]]
binding = "DB_SCORES"
database_name = "heap_scores"
database_id = "5e4ff42c-19b6-4fc0-b8ad-d2403e549d4d"
migrations_dir = "migrations/heap_scores"

[[d1_databases]]
binding = "DB_REWARDS"
database_name = "heap_rewards"
database_id = "e4455f98-49b5-4958-95f5-68889b545a05"
migrations_dir = "migrations/heap_rewards"

[[d1_databases]]
binding = "DB_TELEMETRY"
database_name = "heap_telemetry"
database_id = "10c8d42d-d08b-462e-a206-5d2767b39f8b"
migrations_dir = "migrations/heap_telemetry"

# Edge read cache (cache-aside / write-through over the heap + score repos).
[[kv_namespaces]]
binding = "CACHE"
id = "a507cae477684d78991295b61a54dcc6"

# Analytics Engine binding — uncomment when deploying to production.
# In local dev (wrangler dev) the AE stub is silently no-op; omitting the
# binding forces the fallback to D1Sink so logs land in the local DB.
[[analytics_engine_datasets]]
  binding = "LOGS"
  dataset = "heap_logs"

[vars]
# Comma-separated list of origins allowed to call the API from a browser.
# Use "*" to allow all (dev only). Tighten to your real production origin(s)
# before relying on the CORS allowlist as a security layer. Production should be:
#   ALLOWED_ORIGINS = "https://heap.example.com,capacitor://localhost,https://localhost"
ALLOWED_ORIGINS = "*"

# Per-IP rate limits (Workers Rate Limiting API). period must be 10 or 60.
# limit is tokens per period, counted per Cloudflare datacenter per key (key = client IP).

[[ratelimits]]
name = "RL_SCORES"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "RL_PLACE"
namespace_id = "1002"
  [ratelimits.simple]
  limit = 30
  period = 60

[[ratelimits]]
name = "RL_GLOBAL"
namespace_id = "1003"
  [ratelimits.simple]
  limit = 300
  period = 60

[[ratelimits]]
name = "RL_LOG"
namespace_id = "1004"
  [ratelimits.simple]
  limit = 100
  period = 60

[[ratelimits]]
name = "RL_CODES"
namespace_id = "1005"
  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "RL_FEEDBACK"
namespace_id = "1006"
  [ratelimits.simple]
  limit = 5
  period = 60

# obscenity is imported by shared/playerName.ts; module resolution from shared/
# climbs to the repo root, never into server/node_modules. The Workers CI build
# installs only server/ deps, so alias the import to the local install.
[alias]
obscenity = "./node_modules/obscenity"
