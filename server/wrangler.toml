name = "heap-server"
main = "src/index.ts"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]

# Domain-sharded D1 databases. database_id values are placeholders until the
# databases are provisioned — see docs/superpowers/runbooks/d1-sharding-kv-cache.md
# ("Provision" step) for the `wrangler d1 create` commands that emit the real ids.
[[d1_databases]]
binding = "DB_HEAP"
database_name = "heap_core"
database_id = "<heap_core-id>"
migrations_dir = "migrations/heap_core"

[[d1_databases]]
binding = "DB_SCORES"
database_name = "heap_scores"
database_id = "<heap_scores-id>"
migrations_dir = "migrations/heap_scores"

[[d1_databases]]
binding = "DB_REWARDS"
database_name = "heap_rewards"
database_id = "<heap_rewards-id>"
migrations_dir = "migrations/heap_rewards"

[[d1_databases]]
binding = "DB_TELEMETRY"
database_name = "heap_telemetry"
database_id = "<heap_telemetry-id>"
migrations_dir = "migrations/heap_telemetry"

# Edge read cache (cache-aside / write-through). Placeholder id until provisioned.
[[kv_namespaces]]
binding = "CACHE"
id = "<cache-namespace-id>"

# Analytics Engine binding — uncomment when deploying to production.
# In local dev (wrangler dev) the AE stub is silently no-op; omitting the
# binding forces the fallback to D1Sink so logs land in the local DB.
[[analytics_engine_datasets]]
  binding = "LOGS"
  dataset = "heap_logs"

[vars]
# Comma-separated list of origins allowed to call the API from a browser.
# Use "*" to allow all (dev only). Tighten to your real production origin(s)
# before relying on the CORS allowlist as a security layer. Production should be:
#   ALLOWED_ORIGINS = "https://heap.example.com,capacitor://localhost,https://localhost"
ALLOWED_ORIGINS = "*"

# Per-IP rate limits (Workers Rate Limiting API). period must be 10 or 60.
# limit is tokens per period, counted per Cloudflare datacenter per key (key = client IP).

[[ratelimits]]
name = "RL_SCORES"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "RL_PLACE"
namespace_id = "1002"
  [ratelimits.simple]
  limit = 30
  period = 60

[[ratelimits]]
name = "RL_GLOBAL"
namespace_id = "1003"
  [ratelimits.simple]
  limit = 300
  period = 60

[[ratelimits]]
name = "RL_LOG"
namespace_id = "1004"
  [ratelimits.simple]
  limit = 100
  period = 60

[[ratelimits]]
name = "RL_CODES"
namespace_id = "1005"
  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "RL_FEEDBACK"
namespace_id = "1006"
  [ratelimits.simple]
  limit = 5
  period = 60
